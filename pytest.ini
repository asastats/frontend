[pytest]
pythonpath =
    asastats
    asastats/permissiondapp/dapp
DJANGO_SETTINGS_MODULE = asastats.settings.development
python_files = tests.py test_*.py *_tests.py
junit_family=legacy
asyncio_mode=auto
asyncio_default_fixture_loop_scope=function
addopts =
    --import-mode=importlib
    --ignore-glob=asastats/permissiondapp
    --ignore-glob=asastats/widgets
    -p no:warnings
norecursedirs = thumbnails
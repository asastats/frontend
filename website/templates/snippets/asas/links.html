{% load static %}
{% load core_extras %}
{% if "Lofty" not in asset.name and asset.unit|slice:":4" != "anmc" %}
  {% for ld in asset.links %}
    <a href="{{ ld.link }}" target="_blank" title="{{ ld.title }}">
      <img class="provider" src="{{ ld.provider.name|provider_icon }}" alt="{{ ld.provider.name }} logo" />
    </a>{% if not forloop.last %}&nbsp;&nbsp;{% endif %}
  {% endfor %}
  {% if asset.links %}<br />{% endif %}
{% endif %}

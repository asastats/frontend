<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Too many requests</title>
    <meta name="description" content="{{ WEBSITE_URL }} too many requests error page">
    <meta name="keywords" content="error,server error,too many requests">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <style>
        * {
            line-height: 1.2;
            margin: 0;
        }

        html {
            color: #575757;
            display: table;
            font-family: sans-serif;
            height: 100%;
            text-align: center;
            width: 100%;
        }

        body {
            display: table-cell;
            vertical-align: middle;
            margin: 2em auto;
        }

        h1 {
            color: #575757;
            font-size: 2em;
            font-weight: 400;
        }

        p {
            margin: 0 auto;
            width: 400px;
        }

        @media only screen and (max-width: 400px) {
            body,
            p {
                width: 95%;
            }
            h1 {
                font-size: 1.5em;
                margin: 0 0 0.3em;
            }
        }
    </style>
</head>

<body>
    <a href="{{ WEBSITE_URL }}"><img src="/logo400.png" border="0" height="120" width="200" alt="Go to {{ WEBSITE_URL }} index page"></a>
    <br>
    <br>
    <h1>Too many requests</h1>
    <br><p>Our free website allows only one request per minute. The requested page will refresh in a minute.</p>
    <script>
        setTimeout(function(){
            window.location.reload();
         }, 60000);
    </script>
</body>
</html>
<!-- IE needs 512+ bytes: http://blogs.msdn.com/b/ieinternals/archive/2010/08/19/http-error-pages-in-internet-explorer.aspx -->

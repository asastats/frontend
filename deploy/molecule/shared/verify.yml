---
- name: Verify deployment (backend-independent checks)
  hosts: all:!localhost
  become: true
  gather_facts: false

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Verify admin user exists (created by createuser role)
      ansible.builtin.command: "id {{ admin_user }}"
      register: admin_user_check
      changed_when: false
      failed_when: admin_user_check.rc != 0

    - name: Assert the web cache Redis instance is running and enabled
      ansible.builtin.assert:
        that:
          - "ansible_facts.services['redis_' + redis_port | string + '.service'].state == 'running'"
          - "ansible_facts.services['redis_' + redis_port | string + '.service'].status == 'enabled'"
        fail_msg: "Web cache Redis (port {{ redis_port }}) is not running or not enabled"
        success_msg: "Web cache Redis (port {{ redis_port }}) is running and enabled"

    - name: "Verify the web cache instance answers on port {{ redis_port }}"
      ansible.builtin.command: >
        redis-cli -p {{ redis_port }} -a {{ redis_password }} ping
      register: redis_ping
      changed_when: false
      failed_when: "'PONG' not in redis_ping.stdout"
      no_log: true

    - name: Verify PostgreSQL user exists
      ansible.builtin.command: >
        psql -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ database_user }}'"
      register: user_exists
      changed_when: false
      failed_when: user_exists.stdout.strip() != "1"

    - name: Verify PostgreSQL database exists
      ansible.builtin.command: >
        psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='{{ database_name }}'"
      register: db_exists
      changed_when: false
      failed_when: db_exists.stdout.strip() != "1"

    - name: Verify pg_trgm extension enabled
      ansible.builtin.command: >
        psql -U postgres -d {{ database_name }} -tAc "SELECT 1 FROM pg_extension WHERE extname='pg_trgm'"
      register: ext_exists
      changed_when: false
      failed_when: ext_exists.stdout.strip() != "1"

    - name: Verify Gunicorn systemd unit file exists
      ansible.builtin.stat:
        path: "/etc/systemd/system/gunicorn-{{ env_name }}.service"
      register: gunicorn_file

    - name: Assert Gunicorn systemd unit present
      ansible.builtin.assert:
        that:
          - gunicorn_file.stat.exists
        fail_msg: "Gunicorn service file not found at /etc/systemd/system/gunicorn-{{ env_name }}.service"
        success_msg: "Gunicorn service file found"

    - name: Assert the Gunicorn service is running
      ansible.builtin.assert:
        that:
          - "ansible_facts.services['gunicorn-' + env_name + '.service'].state == 'running'"
        fail_msg: "Gunicorn service is not running"
        success_msg: "Gunicorn service is running"

    - name: Fetch the Django about page from nginx to verify the app responds
      ansible.builtin.uri:
        url: "http://localhost/about/"
        return_content: true
        status_code: [200]
      register: verify_about
      changed_when: false

    - name: Ensure about page responded with HTML
      ansible.builtin.assert:
        that:
          - "'<html' in verify_about.content.lower()"
        fail_msg: "Nginx did not return the Django about HTML page."
        success_msg: "Nginx served the Django about page."

    - name: Verify a collected static asset is served
      ansible.builtin.uri:
        url: "http://localhost/static/logo.png"
        status_code: [200]
      register: verify_static_asset
      changed_when: false

    - name: Assert static asset was served
      ansible.builtin.assert:
        that:
          - verify_static_asset.status == 200
        fail_msg: "Collected static asset was not served by nginx."
        success_msg: "Static assets are served by nginx."

    # ── Cross-repo coupling: the api.asastats.com drop-in must be includable ──
    - name: Read the nginx main configuration
      ansible.builtin.slurp:
        path: /etc/nginx/nginx.conf
      register: verify_nginx_conf

    - name: Assert the sites-enabled drop-in include is present
      ansible.builtin.assert:
        that:
          - "'include /etc/nginx/sites-enabled/*;' in (verify_nginx_conf.content | b64decode)"
        fail_msg: >-
          nginx.conf is missing 'include /etc/nginx/sites-enabled/*;' — the backend's
          api.asastats.com server block would not be picked up. See CONTRIBUTING.
        success_msg: "nginx.conf includes the sites-enabled drop-in directory."

    - name: Dump the effective nginx configuration
      ansible.builtin.command: nginx -T
      register: verify_nginx_dump
      changed_when: false

    - name: Assert nginx actually loads sites-enabled drop-ins
      ansible.builtin.assert:
        that:
          - "'/etc/nginx/sites-enabled/' in verify_nginx_dump.stdout"
        fail_msg: "nginx is not loading any sites-enabled drop-in; the api site would be ignored."
        success_msg: "nginx loads sites-enabled drop-ins (api site will be honored)."

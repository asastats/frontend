---
# Molecule-only concrete values (shadow the env-driven project group_vars).
app_name: asastats
django_settings: "{{ app_name }}.settings.testing"

site_name: testing.example.com
project_name: testing.example.com
env_name: "testing_asastats"

github_user: asastats
repo_name: frontend
repository_url: "https://github.com/{{ github_user }}/{{ repo_name }}.git"

admin_user: admin_user
admin_user_group: admin_user
admin_home_directory: "/home/{{ admin_user }}/"
admin_email: "admin_user@example.com"

local_path_to_public_key: "{{ env_vars.PUBLIC_KEY_LOCAL_PATH | default('~/.ssh/id_rsa.pub') }}"

webapp_user: webapp_user
webapp_group: webapps

projects_path: /var/www/
site_path: "{{ projects_path }}{{ site_name }}"

gunicorn_workers: 3
log_level: debug

opt_folder: "/home/{{ admin_user }}/opt/"
postgresql_version: 16
database_backup_folder: "/home/{{ admin_user }}/backups/"
requirements_filename: testing.txt

lynis_version: 3.1.6

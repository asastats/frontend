dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu2404
    image: trfore/docker-ubuntu2404-systemd:latest
    privileged: true
    command: "/lib/systemd/systemd"
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /tmp:/tmp
    pre_build_image: true

provisioner:
  name: ansible
  config_file: ../../ansible.cfg
  log: true
  env:
    ANSIBLE_REMOTE_TEMP: "/tmp/.ansible/tmp"
    ANSIBLE_LOCAL_TEMP: "/tmp/.ansible/local"
    ANSIBLE_ROLES_PATH: "../../roles"
    ANSIBLE_COLLECTIONS_PATHS: "../../collections"
    ANSIBLE_STDOUT_CALLBACK: "debug"
  playbooks:
    prepare: ../shared/prepare.yml
    converge: converge.yml
    verify: ../shared/verify.yml
  inventory:
    host_vars:
      ubuntu2404:
        ansible_connection: docker
        ansible_user: root
    # Concrete values shared by converge AND verify (verify runs as a
    # separate play, so anything it references must live in the inventory).
    group_vars:
      all:
        is_molecule_test: true
        host_alias: production
        app_name: asastats
        django_settings: asastats.settings.production
        site_name: tracker.example.com
        project_name: tracker.example.com
        env_name: production_asastats
        logo_name: asastats
        admin_user: admin_user
        admin_user_group: admin_user
        admin_home_directory: /home/admin_user/
        admin_email: admin_user@example.com
        local_path_to_public_key: "~/.ssh/id_rsa.pub"
        repository_url: https://github.com/asastats/frontend.git
        webapp_user: webapp_user
        webapp_group: webapps
        projects_path: /var/www/
        site_path: /var/www/tracker.example.com
        gunicorn_workers: 3
        log_level: info
        opt_folder: /home/admin_user/opt/
        postgresql_version: 16
        database_backup_folder: /home/admin_user/backups/
        requirements_filename: production.txt
        lynis_version: 3.1.6
        redis_port: 6380
        redis_data_dir: /var/lib/redis6380
        # Must match REDIS_PASSWORD in the .env the converge loads
        redis_password: redispwd
        # Must match DATABASE_USER / DATABASE_NAME in that .env
        database_user: asastats_db
        database_name: asastats_db
        permissionsupdater_enabled: false

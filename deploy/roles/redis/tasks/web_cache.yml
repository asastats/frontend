---
- name: "Copy package redis.conf to the web cache config (port {{ redis_port }})"
  ansible.builtin.copy:
    src: /etc/redis/redis.conf
    dest: "/etc/redis/redis_{{ redis_port }}.conf"
    remote_src: true
    owner: redis
    group: redis
    mode: "0640"
    force: false
  become: true
  tags: [redis-web-cache]

- name: "Ensure web cache data directory exists ({{ redis_data_dir }})"
  ansible.builtin.file:
    path: "{{ redis_data_dir }}"
    owner: redis
    group: redis
    state: directory
    mode: "0750"
  become: true
  tags: [redis-web-cache]

- name: "Configure the web cache Redis instance on port {{ redis_port }}"
  ansible.builtin.lineinfile:
    path: "/etc/redis/redis_{{ redis_port }}.conf"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  become: true
  loop:
    - regexp: "^port "
      line: "port {{ redis_port }}"
    - regexp: "^pidfile "
      line: "pidfile /run/redis/redis-server-{{ redis_port }}.pid"
    - regexp: "^logfile "
      line: "logfile /var/log/redis/redis-server-{{ redis_port }}.log"
    - regexp: "^dir "
      line: "dir {{ redis_data_dir }}"
    - regexp: '^#?\s*masterauth '
      line: "masterauth {{ hostvars['localhost'].env_vars.REDIS_PASSWORD }}"
    - regexp: '^#?\s*requirepass '
      line: "requirepass {{ hostvars['localhost'].env_vars.REDIS_PASSWORD }}"
  notify: "Enable and restart web cache"
  tags: [redis-web-cache]

- name: "Install the systemd unit for the web cache on port {{ redis_port }}"
  ansible.builtin.template:
    src: redis_instance.service
    dest: "/etc/systemd/system/redis_{{ redis_port }}.service"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: "Enable and restart web cache"
  tags: [redis-web-cache]

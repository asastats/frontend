[fcgi-program:asgi]
# TCP socket used by the nginx upstream
socket=tcp://127.0.0.1:{{ daphne_port | default(8001) }}

# Project directory
directory={{ site_path }}/source/{{ app_name }}

# Each process gets its own unix socket (process_num)
command={{ site_path }}/venv/bin/daphne -u {{ site_path }}/run/daphne%(process_num)d.sock --fd 0 --access-log - --proxy-headers {{ daphne_asgi_module | default('config.asgi:application') }}

# Roughly the number of CPUs
numprocs={{ daphne_numprocs | default(4) }}

# Unique process name
process_name=asgi%(process_num)d

# Run as the web-app user
user={{ webapp_user }}
group={{ webapp_group }}

# Start and recover automatically
autostart=true
autorestart=true

# Logging
stdout_logfile={{ site_path }}/logs/asgi.log
redirect_stderr=true

environment=DJANGO_SETTINGS_MODULE={{ django_settings }},SECRET_KEY="{{ hostvars['localhost'].env_vars.SECRET_KEY | replace('%', '%%') }}",DATABASE_NAME="{{ hostvars['localhost'].env_vars.DATABASE_NAME }}",DATABASE_USER="{{ hostvars['localhost'].env_vars.DATABASE_USER }}",DATABASE_PASSWORD="{{ hostvars['localhost'].env_vars.DATABASE_PASSWORD }}"
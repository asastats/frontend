ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;
ssl_session_tickets off;

# ssl_protocols TLSv1.2; # only modern browsers
ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256';
ssl_ecdh_curve secp384r1;
ssl_prefer_server_ciphers on;

add_header Strict-Transport-Security "max-age=31536000; includeSubdomains; preload";
add_header X-Content-Type-Options nosniff;
## https://content-security-policy.com/
add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://www.{{ site_name }} https://api.folksrouter.io https://hayrouter.txnlab.dev https://static.defly.app https://*.perawallet.app wss://*.perawallet.app https://*.nodely.dev https://api.web3modal.org https://api.web3modal.com data: wss://*.walletconnect.org wss://*.walletconnect.com wss://*.reown.com https://*.walletconnect.com https://*.walletconnect.org https://*.reown.com; base-uri 'self'; form-action 'self' https://accounts.google.com https://github.com https://www.reddit.com https://twitter.com https://discord.com https://www.{{ site_name }}; manifest-src 'self'; img-src 'self' data: https://www.{{ site_name }} https://cdn.asastats.com https://cdn.redoc.ly/redoc; script-src 'self' 'unsafe-inline' https://www.{{ site_name }}; font-src 'self' fonts.gstatic.com https://fonts.reown.com https://www.{{ site_name }} https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com https://www.{{ site_name }} https://cdnjs.cloudflare.com; frame-src https://www.youtube.com https://verify.walletconnect.com https://verify.walletconnect.org https://secure.walletconnect.com https://secure.walletconnect.org; object-src 'none'; worker-src 'self' blob: " always;
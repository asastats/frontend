[Service]
ExecStart=
ExecStart=/usr/local/openresty/nginx/sbin/nginx -c /etc/nginx/nginx.conf -g 'daemon on; master_process on;'

ExecStartPre=
ExecStartPre=/usr/local/openresty/nginx/sbin/nginx -t -c /etc/nginx/nginx.conf -q -g 'daemon on; master_process on;'

ExecReload=
ExecReload=/usr/local/openresty/nginx/sbin/nginx -s reload -c /etc/nginx/nginx.conf

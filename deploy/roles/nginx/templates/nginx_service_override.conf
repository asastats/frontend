[Service]
ExecStart=
ExecStart=/usr/local/openresty/nginx/sbin/nginx -g 'daemon on; master_process on; pid /run/nginx.pid;' -c /etc/nginx/nginx.conf

ExecStartPre=
ExecStartPre=/usr/local/openresty/nginx/sbin/nginx -t -q -g 'daemon on; master_process on; pid /run/nginx.pid;' -c /etc/nginx/nginx.conf

ExecReload=
ExecReload=/usr/local/openresty/nginx/sbin/nginx -g 'daemon on; master_process on; pid /run/nginx.pid;' -s reload -c /etc/nginx/nginx.conf

# Configuration for {{ site_name }}

include /etc/nginx/snippets/site_http_block.conf;

upstream channels-backend {
{% for i in range(daphne_numprocs | default(4) | int) %}
    server unix:{{ site_path }}/run/daphne{{ i }}.sock;
{% endfor %}
}

# http://{{ site_name }} and http://www.{{ site_name }} -> https://www.{{ site_name }}
# default_server so any unmatched Host on :80 lands here, not on another vhost.
server {
    listen 80 default_server;
    listen [::]:80 default_server ipv6only=on;
    server_name {{ site_name }} www.{{ site_name }};
    include /etc/nginx/snippets/letsencrypt.conf;
    location / {
        return 301 https://www.{{ site_name }}$request_uri;
    }
}

# HTTPS apex -> www (canonical)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name {{ site_name }};

    ssl_certificate /etc/letsencrypt/live/{{ site_name }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ site_name }}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/{{ site_name }}/fullchain.pem;
    include /etc/nginx/snippets/ssl.conf;

    return 301 https://www.{{ site_name }}$request_uri;
}

## Serves https for the canonical host (www). Sole default_server on :443.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server ipv6only=on;
    http2 on;
    server_name www.{{ site_name }};
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_certificate /etc/letsencrypt/live/{{ site_name }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ site_name }}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/{{ site_name }}/fullchain.pem;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;
    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/site_server_block.conf;
}

lua_shared_dict bundle_hash_map 10m;

init_worker_by_lua_block {
    local lfs = require "lfs"
    local dict = ngx.shared.bundle_hash_map
    local dir = "{{ site_path }}/data/bundles/"
    local interval = 300  -- how often to rescan, in seconds

    local function load_slugs(premature)
        if premature then
            return
        end

        -- clear existing entries (optional, to avoid stale slugs)
        dict:flush_all()
        dict:flush_expired()

        for file in lfs.dir(dir) do
            -- slug: allows letters, digits, dot, underscore, hyphen
            local slug, hash = file:match("^([A-Za-z0-9._-]+)_([A-Fa-f0-9]+)$")
            if slug and #hash == 40 then
                dict:set(slug, hash)
            end
        end

        -- schedule next run
        local ok, err = ngx.timer.at(interval, load_slugs)
        if not ok then
            ngx.log(ngx.ERR, "failed to reschedule slug loader: ", err)
        end
    end

    -- kick off the first run immediately
    local ok, err = ngx.timer.at(0, load_slugs)
    if not ok then
        ngx.log(ngx.ERR, "failed to start slug loader: ", err)
    end
}

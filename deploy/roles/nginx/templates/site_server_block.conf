# # We would leave default nginx logs for now
# access_log {{ site_path }}/logs/nginx-access.log;
# error_log {{ site_path }}/logs/nginx-error.log;

include /etc/nginx/snippets/favicon.conf;

location = /robots.txt {
    alias {{ site_path }}/source/{{ app_name }}/templates/robots.txt;
}

error_page 400 401 403 404 /404.html;
location = /404.html {
    root {{ site_path }}/source/{{ app_name }}/templates/;
}

location = /403_csrf.html {
    root {{ site_path }}/source/{{ app_name }}/templates/;
}

error_page 500 502 504 /500.html;
location = /500.html {
    root {{ site_path }}/source/{{ app_name }}/templates/;
}

error_page 503 /503r.html;
location = /503r.html {
    root {{ site_path }}/source/{{ app_name }}/templates/;
}

location /static/thumbnails/ {
    alias {{ site_path }}/static/thumbnails/;
    try_files $uri /static/icons/empty.png;
}

location /static/icons/ {
    alias {{ site_path }}/static/icons/;
    try_files $uri /static/icons/empty.png;
}

location = /static/icons/empty.png {
    alias {{ site_path }}/static/icons/empty.png;
    expires 1d;
}

location /static {
    # autoindex on;
    alias {{ site_path }}/static;
    expires 10d;
}

# Root page
location = / {
    proxy_pass http://unix:{{ site_path }}/run/{{ site_name }}.socket;
    include /etc/nginx/snippets/proxy_headers.conf;
    proxy_buffers 8 24k;
    proxy_buffer_size 2k;
    proxy_read_timeout 241;
}

# Global bundle slug -> hash (OpenResty Lua)
location ~* ^/([A-Za-z0-9._-]+)/?$ {
    set $slug $1;

    access_by_lua_block {
        local slug = ngx.var.slug
        slug = string.lower(slug)
        local dict = ngx.shared.bundle_hash_map
        local hash = dict:get(slug)

        if hash then
            return ngx.exec("/" .. hash)
        end
    }

    # Prevent nginx from trying to serve static files
    try_files "" @fallback;
}

location ~* "^/([a-zA-Z0-9]{40}|[a-zA-Z0-9]{58})" {
    ## Prevent "Invalid HTTP_HOST header ..." message
    if ( $host !~* ^({{ site_name }}|www.{{ site_name }}|{{ inventory_hostname }}|localhost)$ ) {
        return 444;
    }
    limit_req zone=main burst=5;
    proxy_buffers 8 24k;
    proxy_buffer_size 2k;
    proxy_read_timeout 241;
    include /etc/nginx/snippets/proxy_headers.conf;
    proxy_pass http://unix:{{ site_path }}/run/{{ site_name }}.socket;
}

location /widgets/ {
    # A real WebSocket handshake has `Upgrade: websocket` -> send it to Daphne.
    # Everything else (htmx/HTTP swap partials, holdings, assets) -> WSGI.
    if ($http_upgrade) { return 418; }
    error_page 418 = @widgets_ws;
    recursive_error_pages on;

    proxy_pass http://unix:{{ site_path }}/run/{{ site_name }}.socket;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffers 8 24k;
    proxy_buffer_size 2k;
    proxy_read_timeout 241;
}

location @widgets_ws {
    proxy_pass http://channels-backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_read_timeout 241;
}

location @fallback {
    ## Prevent "Invalid HTTP_HOST header ..." message
    if ( $host !~* ^({{ site_name }}|www.{{ site_name }}|{{ inventory_hostname }}|localhost)$ ) {
        return 444;
    }
    proxy_buffers 8 24k;
    proxy_buffer_size 2k;
    proxy_read_timeout 241;
    include /etc/nginx/snippets/proxy_headers.conf;
    proxy_pass http://unix:{{ site_path }}/run/{{ site_name }}.socket;
}

# https://lincolnloop.com/blog/rate-limiting-nginx/
location /accounts/login/ {
    # apply rate limiting
    limit_req zone=login burst=5;

    # boilerplate copied from location /
    proxy_buffers 8 24k;
    proxy_buffer_size 2k;
    include /etc/nginx/snippets/proxy_headers.conf;
    proxy_pass http://unix:{{ site_path }}/run/{{ site_name }}.socket;
}

# --- Catch-all for normal paths ---
location / {
    try_files $uri $uri/ @fallback;
}

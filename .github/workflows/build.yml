name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  main:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asastats_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r asastats/requirements/development.txt

      - name: Create env file
        run: |
          touch asastats/.env
          echo SECRET_KEY="mysecretkey" >> asastats/.env
          echo DATABASE_NAME="asastats_db" >> asastats/.env
          echo DATABASE_USER="postgres" >> asastats/.env
          echo DATABASE_PASSWORD="postgres" >> asastats/.env

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Collect static files
        env:
          DJANGO_SETTINGS_MODULE: asastats.settings.development
        run: |
          python asastats/manage.py collectstatic --noinput

      - name: Run main Django project unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/asastats_db
        run: |
          pytest -k "not integration_tests" --cov=. --cov-report=xml:coverage-main.xml --cov-report=term-missing

      - name: Run widgets submodule tests
        env:
          PYTHONPATH: asastats
          COVERAGE_RCFILE: asastats/widgets/.coveragerc
        run: |
          pytest asastats/widgets -c asastats/widgets/pytest.ini --cov=widgets --cov-report=xml:coverage-widgets.xml --cov-report=term-missing

      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Pass both files as a comma-separated list
          files: ./coverage-main.xml,./coverage-widgets.xml
          flags: main-project
          name: main-coverage          
name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  main:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: website_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r website/requirements/development.txt

      - name: Create env file
        run: |
          touch website/.env
          echo SECRET_KEY="mysecretkey" >> website/.env
          echo DATABASE_NAME="website_db" >> website/.env
          echo DATABASE_USER="postgres" >> website/.env
          echo DATABASE_PASSWORD="postgres" >> website/.env

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Collect static files
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: |
          python website/manage.py collectstatic --noinput

      - name: Run main Django project unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/website_db
        run: |
          pytest -k "not integration_tests" --cov=. --cov-report=xml:coverage-main.xml --cov-report=term-missing

      - name: Run widgets submodule tests
        env:
          PYTHONPATH: website
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/website_db
          COVERAGE_RCFILE: website/widgets/.coveragerc
        run: |
          pytest website/widgets -c website/widgets/pytest.ini --cov=widgets --cov-report=xml:coverage-widgets.xml --cov-report=term-missing

      - name: Upload main project coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-main.xml
          flags: main-project
          name: main-coverage

      - name: Upload widgets coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-widgets.xml
          flags: widgets-python
          name: widgets-coverage

  frontend:
    runs-on: ubuntu-latest
    needs: main

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "wallet/package-lock.json"

      - name: Install dependencies (wallet)
        run: |
          cd wallet
          npm ci

      - name: Run wallet Typescript tests with coverage
        run: |
          cd wallet
          npm run test:coverage

      - name: Upload wallet Typescript coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: wallet/coverage
          flags: wallet-typescript
          name: wallet-coverage

      - name: Install dependencies (website)
        run: |
          cd website
          npm install

      - name: Run website's tests with coverage
        run: |
          cd website
          npm run test:coverage

      - name: Upload website's Javascript coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: website/javascript_tests/coverage
          flags: website-javascript
          name: website-coverage

  widgets:
    runs-on: ubuntu-latest
    needs: main

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "website/widgets/inhouse/historic/package-lock.json"

      - name: Install dependencies (historic)
        run: |
          cd website/widgets/inhouse/historic
          npm install

      - name: Run historic widget Javascript tests with coverage
        run: |
          cd website/widgets/inhouse/historic
          npm run test

      - name: Upload historic widget Javascript coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: website/widgets/inhouse/historic/tests/javascript/coverage
          flags: widgets-historic-javascript
          name: widgets-historic-coverage

      - name: Install dependencies (swapcore)
        run: |
          cd website/widgets/inhouse/swapcore
          npm install

      - name: Run swapcore widget Javascript tests with coverage
        run: |
          cd website/widgets/inhouse/swapcore
          npm run test

      - name: Upload swapcore widget Javascript coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: website/widgets/inhouse/swapcore/tests/javascript/coverage
          flags: widgets-swapcore-javascript
          name: widgets-swapcore-coverage
